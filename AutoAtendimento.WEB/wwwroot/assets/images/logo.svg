<svg width="220" height="60" viewBox="0 0 220 60" fill="none" xmlns="http://www.w3.org/2000/svg">
  
  <!-- FUNDO BRANCO -->
  <rect width="220" height="60" fill="#FFFFFF"/>

  <defs>
    <linearGradient id="grad1" x1="0" y1="0" x2="60" y2="60" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#00C6FF"/>
      <stop offset="100%" stop-color="#FDC830"/>
    </linearGradient>
  </defs>

  <!-- Ícone -->
  <g transform="translate(10,10)">
    <!-- Sol -->
    <circle cx="20" cy="20" r="10" fill="url(#grad1)" opacity="0.9"/>
    
    <!-- Onda -->
    <path d="M5 25 
             C15 15, 25 35, 35 25 
             C30 40, 10 40, 5 25Z" 
          fill="url(#grad1)" opacity="0.8"/>
  </g>

  <!-- Texto -->
  <text x="70" y="35" font-family="Segoe UI, sans-serif" font-size="24" fill="#1F2937">
    Praia<tspan fill="#00C6FF">Atende</tspan>
  </text>

</svg>